<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallpaper Forge</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231e1e2e'/%3E%3Cpath d='M8 8h6v6H8z' fill='%23ff79c6'/%3E%3Ccircle cx='23' cy='11' r='3' fill='%238be9fd'/%3E%3Cpath d='M8 20 l5 5 l5-5' stroke='%23f1fa8c' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cline x1='20' y1='24' x2='24' y2='20' stroke='%23bd93f9' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16140f">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

<div class="sidebar">
  <div class="brand">
    <span class="eyebrow">Procedural / No two alike</span>
    <h1>Wallpaper Forge</h1>
    <p>Generate a one&#8209;off background, sized for your screen. Every reroll is a new variation &mdash; nothing is stored or repeated.</p>
  </div>

  <div class="field">
    <label>Device</label>
    <div class="seg" id="deviceSeg">
      <button data-device="phone" class="active">Phone</button>
      <button data-device="desktop">Desktop</button>
      <button data-device="square">Square</button>
      <button data-device="custom">Custom</button>
    </div>
  </div>

  <div class="field" id="sizeField">
    <label>Resolution</label>
    <select id="sizeSelect"></select>
    <div class="custom-res-row" id="customResRow" style="display:none;">
      <input type="number" id="customW" min="1" max="8000" value="1170">
      <span>×</span>
      <input type="number" id="customH" min="1" max="8000" value="2532">
    </div>
    <button class="detect-btn" id="detectResBtn" style="display:none;">⌖ Use my screen resolution</button>
  </div>

  <hr>

  <div class="field">
    <label>Pattern</label>
    <div class="pattern-grid" id="patternGrid"></div>
  </div>

  <div class="field" id="solidColorField" style="display:none;">
    <label>Solid Color</label>
    <div class="color-row">
      <input type="color" id="solidColorPicker" value="#16282c">
      <input type="text" id="solidColorHex" value="#16282c" maxlength="7">
    </div>
  </div>

  <hr>

  <div class="field">
    <label>Mode</label>
    <div class="seg" id="modeSeg">
      <button data-mode="dark" class="active">Dark</button>
      <button data-mode="light">Light</button>
    </div>
  </div>

  <div class="field" id="paletteField">
    <label>Palette</label>
    <div class="swatches" id="paletteGrid"></div>
  </div>

  <div class="field" id="densityField">
    <label>Density</label>
    <div class="slider-row">
      <input type="range" id="densitySlider" min="1" max="10" value="5">
      <span class="val" id="densityVal">5</span>
    </div>
  </div>

  <div class="field">
    <label>Grain</label>
    <div class="slider-row">
      <input type="range" id="grainSlider" min="0" max="10" value="3">
      <span class="val" id="grainVal">3</span>
    </div>
  </div>

  <hr>

  <button class="reroll-btn" id="rerollBtn">⟳ Reroll this pattern</button>
  <button class="random-btn" id="randomBtn">✦ Random Everything</button>
  <div class="seed-display" id="seedDisplay">seed &mdash;</div>

  <button class="download-btn" id="downloadBtn">Download PNG</button>
</div>

<div class="stage">
  <div class="frame-wrap">
    <div class="frame-label" id="frameLabel">1170 × 2532</div>
    <canvas id="cv"></canvas>
  </div>
</div>

<script src="script.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
