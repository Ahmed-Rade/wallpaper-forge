<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wallpaper Forge</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="gl-canvas"></canvas>

<!-- Top bar -->
<div class="ui-top" id="uiTop">
  <div class="logotype">Wallpaper Forge</div>
  <div class="ui-top-right">
    <!-- Mode lock dot (hidden until mode locked) -->
    <div class="mode-lock-dot" id="modeLockDot" hidden>
      <span class="mode-dot-circle" id="modeDotCircle"></span>
      <span class="mode-dot-label" id="modeDotLabel"></span>
    </div>
    <!-- Seed pill: click copies URL -->
    <button class="seed-pill" id="seedPill" title="Copy link to this wallpaper">
      <span id="seedDisplay">WF-000000</span>
      <span class="seed-copy-hint" id="seedCopyHint">Copy</span>
    </button>
  </div>
</div>

<!-- Bottom bar -->
<div class="ui-bottom" id="uiBottom">
  <div class="bottom-cluster">
    <!-- Evolve toggle, left of cluster -->
    <button class="aux-btn evolve-toggle" id="evolveToggle" title="Evolve mode (E)">Evolve</button>

    <!-- Main pill -->
    <div class="pill">
      <button class="pill-btn" id="backBtn">← Back</button>
      <div class="pill-divider"></div>
      <button class="pill-btn pill-btn--next" id="nextBtn">Next →</button>
      <div class="pill-divider"></div>
      <button class="pill-btn" id="saveBtn">↓ Save</button>
    </div>

    <!-- Config gear, right of cluster -->
    <button class="aux-btn" id="configToggle" title="Settings (C)">⚙</button>
  </div>

  <!-- History dots -->
  <div class="hist-dots" id="histDots">
    <span class="hist-dot"></span>
    <span class="hist-dot"></span>
    <span class="hist-dot"></span>
  </div>
</div>

<!-- Config panel (slides up from bottom) -->
<div class="config-panel" id="configPanel">
  <div class="config-sheet">
    <div class="config-header">
      <span class="config-title">Settings</span>
      <button class="config-close" id="configClose">✕</button>
    </div>

    <div class="config-row">
      <div class="config-label">Device</div>
      <div class="seg" id="deviceSeg">
        <button data-device="phone" class="active">Phone</button>
        <button data-device="desktop">Desktop</button>
        <button data-device="square">Square</button>
      </div>
    </div>

    <div class="config-row">
      <div class="config-label">Resolution</div>
      <select id="resSelect"></select>
    </div>

    <div class="config-row">
      <div class="config-label">Mode</div>
      <div class="mode-pills" id="modePills">
        <button class="mode-pill active" data-mode="auto">Auto</button>
        <button class="mode-pill" data-mode="ethereal">Ethereal</button>
        <button class="mode-pill" data-mode="organic">Organic</button>
        <button class="mode-pill" data-mode="cosmic">Cosmic</button>
        <button class="mode-pill" data-mode="watercolor">Watercolor</button>
        <button class="mode-pill" data-mode="molten">Molten</button>
        <button class="mode-pill" data-mode="botanical">Botanical</button>
        <button class="mode-pill" data-mode="neonnoir">Neon Noir</button>
        <button class="mode-pill" data-mode="arctic">Arctic</button>
        <button class="mode-pill" data-mode="brutalist">Brutalist</button>
        <button class="mode-pill" data-mode="retrotech">Retro Tech</button>
      </div>
    </div>
  </div>
</div>

<!-- Config backdrop -->
<div class="config-backdrop" id="configBackdrop"></div>

<!-- Shortcuts overlay -->
<div class="shortcuts-overlay" id="shortcutsOverlay">
  <div class="shortcuts-box">
    <div class="shortcuts-title">Keyboard Shortcuts</div>
    <div class="shortcuts-grid">
      <span>Space / →</span><span>Next wallpaper</span>
      <span>←  /  B</span><span>Back</span>
      <span>S</span><span>Save</span>
      <span>E</span><span>Toggle Evolve mode</span>
      <span>C / Esc</span><span>Toggle settings</span>
      <span>?</span><span>Show shortcuts</span>
    </div>
    <button class="shortcuts-close" id="shortcutsClose">Close</button>
  </div>
</div>

<script src="js/shaders.js"></script>
<script src="js/aesthetics.js"></script>
<script src="js/generator.js"></script>
<script src="js/renderer.js"></script>
<script src="js/export.js"></script>
<script src="js/main.js"></script>
</body>
</html>
